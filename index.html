<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单页面 - 购物车功能</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .cart-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .cart-count, .cart-total {
            font-size: 14px;
            color: #666;
        }
        .cart-count span, .cart-total span {
            font-weight: 600;
            color: #ff6b6b;
            font-size: 16px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .menu-item {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .menu-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .menu-item-image {
            width: 100%;
            height: 160px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 48px;
        }
        .menu-item-content {
            padding: 16px;
        }
        .menu-item-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .menu-item-desc {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .menu-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-item-price {
            font-size: 18px;
            font-weight: 600;
            color: #ff6b6b;
        }
        .add-btn {
            background: #ff6b6b;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-btn:hover {
            background: #ff5252;
        }
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }
        .cart-modal.active {
            display: flex;
        }
        .cart-panel {
            background: #fff;
            width: 100%;
            max-height: 70vh;
            border-radius: 16px 16px 0 0;
            padding: 20px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .cart-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }
        .cart-panel-title {
            font-size: 18px;
            font-weight: 600;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .cart-item-name {
            font-size: 15px;
            color: #333;
        }
        .cart-item-price {
            font-size: 14px;
            color: #ff6b6b;
        }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-btn:hover {
            background: #f5f5f5;
        }
        .qty-num {
            font-size: 15px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }
        .cart-empty {
            text-align: center;
            padding: 40px 0;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>今日菜单</h1>
            <div class="cart-info">
                <div class="cart-count">购物车: <span id="cartCount">0</span> 件</div>
                <div class="cart-total">总价: ¥<span id="cartTotal">0.00</span></div>
            </div>
        </div>

        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <div class="cart-modal" id="cartModal">
        <div class="cart-panel">
            <div class="cart-panel-header">
                <div class="cart-panel-title">购物车</div>
                <button class="close-btn" onclick="closeCart()">×</button>
            </div>
            <div id="cartItems"></div>
        </div>
    </div>

    <script>
        const menuData = [
            { id: 1, name: '宫保鸡丁', desc: '经典川菜，鸡肉嫩滑，花生香脆', price: 28.00 },
            { id: 2, name: '红烧肉', desc: '五花肉慢炖，肥而不腻', price: 38.00 },
            { id: 3, name: '清蒸鲈鱼', desc: '新鲜鲈鱼，清淡鲜美', price: 48.00 },
            { id: 4, name: '麻婆豆腐', desc: '四川特色，麻辣鲜香', price: 22.00 },
            { id: 5, name: '回锅肉', desc: '家常美味，色香味俱全', price: 32.00 },
            { id: 6, name: '酸辣土豆丝', desc: '爽口开胃，经济实惠', price: 16.00 },
            { id: 7, name: '糖醋里脊', desc: '酸甜可口，外酥里嫩', price: 35.00 },
            { id: 8, name: '鱼香肉丝', desc: '川菜代表，咸甜酸辣', price: 30.00 }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = menuData.map(item => `
                <div class="menu-item">
                    <div class="menu-item-image">🍜</div>
                    <div class="menu-item-content">
                        <div class="menu-item-name">${item.name}</div>
                        <div class="menu-item-desc">${item.desc}</div>
                        <div class="menu-item-footer">
                            <div class="menu-item-price">¥${item.price.toFixed(2)}</div>
                            <button class="add-btn" onclick="addToCart(${item.id})">加入购物车</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menuData.find(m => m.id === id);
            const existItem = cart.find(c => c.id === id);

            if (existItem) {
                existItem.quantity += 1;
            } else {
                cart.push({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: 1
                });
            }

            saveCart();
            updateCartDisplay();
        }

        function updateQuantity(id, delta) {
            const item = cart.find(c => c.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(c => c.id !== id);
                }
            }
            saveCart();
            updateCartDisplay();
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function updateCartDisplay() {
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

            document.getElementById('cartCount').textContent = totalCount;
            document.getElementById('cartTotal').textContent = totalPrice.toFixed(2);

            const cartItemsEl = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItemsEl.innerHTML = '<div class="cart-empty">购物车是空的</div>';
            } else {
                cartItemsEl.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">¥${(item.price * item.quantity).toFixed(2)}</div>
                        </div>
                        <div class="cart-item-qty">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span class="qty-num">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        document.getElementById('cartModal').addEventListener('click', (e) => {
            if (e.target.id === 'cartModal') {
                closeCart();
            }
        });

        document.querySelector('.cart-info').addEventListener('click', () => {
            document.getElementById('cartModal').classList.add('active');
        });

        renderMenu();
        updateCartDisplay();
    </script>
</body>
</html>
