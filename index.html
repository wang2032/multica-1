<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际射击</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a1a;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            gap: 20px;
        }
        #game-canvas {
            border: 4px solid #00ffff;
            background: #0a0a1a;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            color: #fff;
            width: 200px;
        }
        .score-box, .level-box, .hp-box {
            padding: 15px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 8px;
        }
        .score-box h3, .level-box h3, .hp-box h3 {
            margin-bottom: 10px;
            color: #00ffff;
            font-size: 14px;
        }
        .score-box div { font-size: 28px; font-weight: bold; color: #ffff00; }
        .level-box div { font-size: 24px; font-weight: bold; color: #ff00ff; }
        .hp-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #88ff00);
            transition: width 0.3s;
        }
        .controls {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 8px;
            font-size: 13px;
            line-height: 2;
        }
        .controls h3 { color: #00ffff; margin-bottom: 10px; font-size: 14px; }
        #start-btn {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #start-btn:hover { transform: scale(1.05); }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 48px;
            font-weight: bold;
            display: none;
            text-shadow: 0 0 20px #ff0000;
        }
        .game-over-container { position: relative; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-over-container">
            <canvas id="game-canvas" width="480" height="640"></canvas>
            <div id="game-over">游戏结束</div>
        </div>
        <div class="side-panel">
            <div class="score-box">
                <h3>得分</h3>
                <div id="score">0</div>
            </div>
            <div class="level-box">
                <h3>关卡</h3>
                <div id="level">1</div>
            </div>
            <div class="hp-box">
                <h3>生命值</h3>
                <div class="hp-bar">
                    <div class="hp-fill" id="hp-fill"></div>
                </div>
            </div>
            <div class="controls">
                <h3>操作说明</h3>
                <p>← → : 左右移动</p>
                <p>↑ ↓ : 上下移动</p>
                <p>空格 : 发射子弹</p>
                <p>P : 暂停</p>
            </div>
            <button id="start-btn">开始游戏</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const hpFill = document.getElementById('hp-fill');
        const startBtn = document.getElementById('start-btn');
        const gameOverEl = document.getElementById('game-over');

        const W = canvas.width, H = canvas.height;
        const PLAYER_W = 40, PLAYER_H = 40;
        const ENEMY_W = 35, ENEMY_H = 35;
        const BULLET_W = 6, BULLET_H = 15;

        let player, bullets, enemies, particles, score, level, hp, gameLoop;
        let paused, gameOver, enemyTimer, shootTimer, keys;

        function init() {
            player = { x: W / 2 - PLAYER_W / 2, y: H - 80, hp: 100 };
            bullets = [];
            enemies = [];
            particles = [];
            score = 0;
            level = 1;
            hp = 100;
            paused = false;
            gameOver = false;
            enemyTimer = 0;
            shootTimer = 0;
            keys = {};
            gameOverEl.style.display = 'none';
            updateUI();
        }

        function updateUI() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            hpFill.style.width = hp + '%';
        }

        function spawnEnemy() {
            const x = Math.random() * (W - ENEMY_W);
            const type = Math.random() < 0.3 ? 2 : 1;
            enemies.push({ x, y: -ENEMY_H, type, hp: type * 10, speed: 1 + level * 0.3 });
        }

        function spawnParticle(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    color,
                    life: 30
                });
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(player.x + PLAYER_W / 2, player.y);
            ctx.lineTo(player.x + PLAYER_W, player.y + PLAYER_H);
            ctx.lineTo(player.x + PLAYER_W / 2, player.y + PLAYER_H - 15);
            ctx.lineTo(player.x, player.y + PLAYER_H);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(player.x + 8, player.y + PLAYER_H - 8, 8, 12);
            ctx.fillRect(player.x + PLAYER_W - 16, player.y + PLAYER_H - 8, 8, 12);
        }

        function drawBullet(b) {
            ctx.fillStyle = '#ffff00';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffff00';
            ctx.fillRect(b.x, b.y, BULLET_W, BULLET_H);
            ctx.shadowBlur = 0;
        }

        function drawEnemy(e) {
            const color = e.type === 2 ? '#ff0000' : '#ff6600';
            ctx.fillStyle = color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.moveTo(e.x + ENEMY_W / 2, e.y + ENEMY_H);
            ctx.lineTo(e.x + ENEMY_W, e.y);
            ctx.lineTo(e.x + ENEMY_W / 2, e.y + 15);
            ctx.lineTo(e.x, e.y);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawParticle(p) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 30;
            ctx.fillRect(p.x, p.y, 4, 4);
            ctx.globalAlpha = 1;
        }

        function update() {
            if (paused || gameOver) return;

            if (keys['ArrowLeft'] && player.x > 0) player.x -= 5;
            if (keys['ArrowRight'] && player.x < W - PLAYER_W) player.x += 5;
            if (keys['ArrowUp'] && player.y > 0) player.y -= 5;
            if (keys['ArrowDown'] && player.y < H - PLAYER_H) player.y += 5;

            if (keys['Space']) {
                if (shootTimer <= 0) {
                    bullets.push({ x: player.x + PLAYER_W / 2 - BULLET_W / 2, y: player.y });
                    shootTimer = 10;
                }
            }

            if (shootTimer > 0) shootTimer--;
            if (enemyTimer <= 0) {
                spawnEnemy();
                enemyTimer = Math.max(30, 60 - level * 5);
            }
            enemyTimer--;

            bullets.forEach(b => b.y -= 10);
            bullets = bullets.filter(b => b.y > -BULLET_H);

            enemies.forEach(e => e.y += e.speed);
            enemies = enemies.filter(e => e.y < H && e.hp > 0);

            bullets.forEach(b => {
                enemies.forEach(e => {
                    if (b.x < e.x + ENEMY_W && b.x + BULLET_W > e.x &&
                        b.y < e.y + ENEMY_H && b.y + BULLET_H > e.y) {
                        e.hp -= 10;
                        b.y = -100;
                        if (e.hp <= 0) {
                            score += e.type * 100;
                            spawnParticle(e.x + ENEMY_W / 2, e.y + ENEMY_H / 2, e.type === 2 ? '#ff0000' : '#ff6600');
                            level = Math.floor(score / 1000) + 1;
                        }
                        updateUI();
                    }
                });
            });

            enemies.forEach(e => {
                if (e.x < player.x + PLAYER_W && e.x + ENEMY_W > player.x &&
                    e.y < player.y + PLAYER_H && e.y + ENEMY_H > player.y) {
                    hp -= 20;
                    e.hp = 0;
                    spawnParticle(player.x + PLAYER_W / 2, player.y + PLAYER_H / 2, '#00ffff');
                    updateUI();
                }
            });

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
            });
            particles = particles.filter(p => p.life > 0);

            if (hp <= 0) {
                gameOver = true;
                gameOverEl.style.display = 'block';
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, W, H);

            for (let i = 0; i < 50; i++) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
            }

            bullets.forEach(drawBullet);
            enemies.forEach(drawEnemy);
            particles.forEach(drawParticle);
            drawPlayer();
        }

        function gameTick() {
            update();
            draw();
        }

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyP') paused = !paused;
            if (e.code === 'Space') e.preventDefault();
        });

        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        startBtn.addEventListener('click', () => {
            init();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameTick, 1000 / 60);
        });

        init();
        draw();
    </script>
</body>
</html>
