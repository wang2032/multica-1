<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单状态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .order-info {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .order-info .order-id {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .order-info .order-number {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .status-timeline {
            padding: 30px 20px;
        }

        .status-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
            position: relative;
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .status-item::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 35px;
            bottom: -15px;
            width: 2px;
            background: #e0e0e0;
        }

        .status-item:last-child::before {
            display: none;
        }

        .status-item.completed::before {
            background: #4caf50;
        }

        .status-item.active::before {
            background: linear-gradient(to bottom, #4caf50 0%, #e0e0e0 100%);
        }

        .status-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .status-item.completed .status-dot {
            background: #4caf50;
        }

        .status-item.active .status-dot {
            background: #4caf50;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.3);
        }

        .status-dot svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .status-content {
            flex: 1;
            padding-top: 5px;
        }

        .status-title {
            font-size: 16px;
            font-weight: 600;
            color: #999;
            margin-bottom: 4px;
        }

        .status-item.completed .status-title,
        .status-item.active .status-title {
            color: #333;
        }

        .status-desc {
            font-size: 13px;
            color: #999;
        }

        .status-item.active .status-desc {
            color: #666;
        }

        .status-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .status-item.active .status-time {
            color: #4caf50;
        }

        .action-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 20px;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .action-btn:active {
            opacity: 0.9;
        }

        .demo-controls {
            padding: 20px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }

        .demo-controls h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .demo-btn {
            padding: 8px 16px;
            margin-right: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .demo-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .demo-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>订单状态</h1>
        </div>

        <div class="order-info">
            <div class="order-id">订单号</div>
            <div class="order-number" id="orderNumber">-</div>
        </div>

        <div class="status-timeline" id="statusTimeline">
            <!-- Status items will be rendered here -->
        </div>

        <button class="action-btn" id="actionBtn">查看详情</button>

        <div class="demo-controls">
            <h3>模拟状态切换（仅供测试）</h3>
            <button class="demo-btn active" data-status="ordered">已下单</button>
            <button class="demo-btn" data-status="making">制作中</button>
            <button class="demo-btn" data-status="delivering">配送中</button>
            <button class="demo-btn" data-status="completed">已完成</button>
        </div>
    </div>

    <script>
        // 订单状态配置
        const statusConfig = {
            ordered: {
                title: '已下单',
                desc: '订单已成功提交',
                icon: `<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>`
            },
            making: {
                title: '制作中',
                desc: '商家正在准备您的订单',
                icon: `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`
            },
            delivering: {
                title: '配送中',
                desc: '骑手正在配送中',
                icon: `<svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>`
            },
            completed: {
                title: '已完成',
                desc: '订单已完成，感谢您的购买',
                icon: `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`
            }
        };

        // 状态顺序
        const statusOrder = ['ordered', 'making', 'delivering', 'completed'];

        // 模拟数据
        const mockOrderData = {
            orderId: 'ORD20260414001',
            statuses: {
                ordered: { time: '2026-04-14 09:30:00', completed: true },
                making: { time: null, completed: false },
                delivering: { time: null, completed: false },
                completed: { time: null, completed: false }
            }
        };

        // 当前状态
        let currentStatus = 'ordered';

        // 渲染状态时间线
        function renderTimeline(status) {
            const timeline = document.getElementById('statusTimeline');
            const orderNumber = document.getElementById('orderNumber');

            orderNumber.textContent = mockOrderData.orderId;

            timeline.innerHTML = statusOrder.map((key, index) => {
                const config = statusConfig[key];
                const statusData = mockOrderData.statuses[key];
                const isCompleted = statusData.completed;
                const isActive = key === status;

                let className = '';
                if (isCompleted) className = 'completed';
                if (isActive) className = 'active';

                return `
                    <div class="status-item ${className}">
                        <div class="status-dot">${config.icon}</div>
                        <div class="status-content">
                            <div class="status-title">${config.title}</div>
                            <div class="status-desc">${config.desc}</div>
                            ${statusData.time ? `<div class="status-time">${statusData.time}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新状态
        function updateStatus(newStatus) {
            currentStatus = newStatus;

            // 更新模拟数据
            let foundCurrent = false;
            statusOrder.forEach(key => {
                if (key === newStatus) {
                    foundCurrent = true;
                    mockOrderData.statuses[key].completed = true;
                    mockOrderData.statuses[key].time = getCurrentTime();
                } else if (foundCurrent) {
                    mockOrderData.statuses[key].completed = false;
                    mockOrderData.statuses[key].time = null;
                }
            });

            // 更新按钮状态
            document.querySelectorAll('.demo-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.status === newStatus) {
                    btn.classList.add('active');
                }
            });

            renderTimeline(newStatus);
        }

        // 获取当前时间
        function getCurrentTime() {
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderTimeline(currentStatus);

            // 绑定模拟按钮
            document.querySelectorAll('.demo-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    updateStatus(btn.dataset.status);
                });
            });

            // 查看详情按钮
            document.getElementById('actionBtn').addEventListener('click', () => {
                alert(`当前订单状态：${statusConfig[currentStatus].title}\n订单号：${mockOrderData.orderId}`);
            });
        });
    </script>
</body>
</html>
