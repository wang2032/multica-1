<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已报名课程 - 学习进度</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .course-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .course-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .course-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .course-progress-text {
            font-size: 14px;
            color: #666;
        }

        .progress-bar-container {
            background-color: #e8e8e8;
            border-radius: 6px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.3s ease;
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的已报名课程</h1>
        <div class="course-list" id="courseList"></div>
    </div>

    <script>
        // 模拟学习进度数据
        const mockCourses = [
            { id: 1, name: 'Python 基础入门', progress: 75, totalLessons: 20, completedLessons: 15 },
            { id: 2, name: '数据结构与算法', progress: 45, totalLessons: 40, completedLessons: 18 },
            { id: 3, name: 'Web 前端开发实战', progress: 90, totalLessons: 30, completedLessons: 27 },
            { id: 4, name: '机器学习导论', progress: 30, totalLessons: 50, completedLessons: 15 }
        ];

        function renderCourses() {
            const courseList = document.getElementById('courseList');
            courseList.innerHTML = mockCourses.map(course => `
                <div class="course-card">
                    <div class="course-header">
                        <span class="course-title">${course.name}</span>
                        <span class="course-progress-text">${course.progress}%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: ${course.progress}%"></div>
                    </div>
                    <div class="course-meta">
                        <span>已学习 ${course.completedLessons} 节</span>
                        <span>共 ${course.totalLessons} 节</span>
                    </div>
                </div>
            `).join('');
        }

        renderCourses();
    </script>
</body>
</html>
